name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Typecheck and test
    runs-on: ubuntu-latest
    env:
      LUSH_TEST_DATABASE_URL: postgres://lush:lush@127.0.0.1:5432/lush_test
    services:
      postgres:
        image: postgres:17@sha256:39fb82e41109483c81ac15422a302500b4a753777b47f8431038703536bc6c52
        env:
          POSTGRES_DB: lush_test
          POSTGRES_USER: lush
          POSTGRES_PASSWORD: lush
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lush -d lush_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun test

  web-distribution:
    name: Build lush-web distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.8

      - name: Install locked dependencies
        run: bun install --frozen-lockfile

      - name: Build distribution
        env:
          REVISION: ${{ github.sha }}
        run: |
          version="$(bun -p 'require("./package.json").version')"
          bun scripts/web-distribution.ts build "$version" "$REVISION"

      - name: Package and validate distribution
        env:
          REVISION: ${{ github.sha }}
        run: |
          version="$(bun -p 'require("./package.json").version')"
          archive="lush-web-dist-$version.tar.gz"
          source_date_epoch="$(git show -s --format=%ct "$REVISION")"
          mkdir -p artifacts extracted
          tar --sort=name --mtime="@$source_date_epoch" \
            --owner=0 --group=0 --numeric-owner --format=posix \
            --pax-option=delete=atime,delete=ctime \
            -czf "artifacts/$archive" -C apps/lush/dist .
          tar -xzf "artifacts/$archive" -C extracted
          bun scripts/web-distribution.ts verify "$version" "$REVISION" extracted
          bun scripts/web-distribution.ts checksum "artifacts/$archive"

  containers:
    name: Build ${{ matrix.image }} image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: lush-api
            dockerfile: containers/api/Dockerfile
          - image: lush-web
            dockerfile: containers/web/Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: lush/${{ matrix.image }}:ci
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
