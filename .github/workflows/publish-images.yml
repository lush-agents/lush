name: Publish images

on:
  workflow_call:
    inputs:
      ref:
        description: SemVer release tag to publish
        required: true
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: SemVer release tag to publish or republish
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: publish-images-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Validate release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      stable: ${{ steps.version.outputs.stable }}
      revision: ${{ steps.revision.outputs.revision }}

    steps:
      - name: Check out release
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Validate version
        id: version
        env:
          RELEASE_REF: ${{ inputs.ref }}
        run: |
          version="$(bun scripts/validate-release.ts "$RELEASE_REF")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [[ "$version" == *-* ]]; then
            echo "stable=false" >> "$GITHUB_OUTPUT"
          else
            echo "stable=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate immutable tag
        env:
          RELEASE_REF: ${{ inputs.ref }}
        run: |
          tag_commit="$(git rev-parse "refs/tags/$RELEASE_REF^{commit}")"
          head_commit="$(git rev-parse HEAD)"
          test "$tag_commit" = "$head_commit"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release source
        run: |
          bun run test:repo
          bun test

      - name: Resolve revision
        id: revision
        run: echo "revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish ${{ matrix.image }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: lush-api
            dockerfile: containers/api/Dockerfile
          - image: lush-web
            dockerfile: containers/web/Dockerfile

    steps:
      - name: Check out release
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/lush-agents/${{ matrix.image }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.stable }}
          labels: |
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.revision }}

      - name: Build and publish image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            REVISION=${{ needs.prepare.outputs.revision }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Attest image provenance
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/lush-agents/${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
